<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./style.css">
    <title>Image Slider</title>
</head>
<body>
    <header>
        <h1>Image Slider</h1>
    </header>
    <div class="slider-box">
        <div class="image-box">
            <img src="https://picsum.photos/500/300" alt="image-1">
            <img src="https://picsum.photos/id/23/500/300" alt="image-2">
            <img src="https://picsum.photos/id/47/500/300" alt="image-3">
            <img src="https://picsum.photos/id/27/500/300" alt="image-4">
            <img src="https://picsum.photos/500/300" alt="image-5">
        </div>
    </div>
    <div class="right-arrow btn"><button><i class="fa-solid fa-arrow-right"></i></button></i></div>
    <div class="left-arrow btn"><button><i class="fa-solid fa-arrow-left"></i></button></i></div>
</body>
</html>
